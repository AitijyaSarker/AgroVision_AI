<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form - Agro Vision</title>
    <link rel="stylesheet" href="contact-form-styles.css">
</head>
<body>
    <div class="container">
        <div class="contact-form-card">
            <h2 class="form-title">Contact Us</h2>
            
            <div id="success-message" class="success-message" style="display: none;">
                <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
                <p>Thank you for contacting us!</p>
            </div>

            <form id="contact-form" class="contact-form">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" name="name" required>
                    <span class="error-message" id="name-error"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email (Optional)</label>
                    <input type="email" id="email" name="email">
                    <span class="error-message" id="email-error"></span>
                </div>

                <div class="form-group">
                    <label for="mobile">Mobile Number (Optional)</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="01XXXXXXXXX">
                    <span class="error-message" id="mobile-error"></span>
                </div>

                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    <span class="error-message" id="message-error"></span>
                </div>

                <div class="form-group">
                    <span class="error-message" id="contact-error"></span>
                </div>

                <button type="submit" class="submit-button" id="submit-btn">
                    <span class="button-text">Submit</span>
                    <span class="button-loader" style="display: none;">
                        <span class="spinner"></span>
                        Loading...
                    </span>
                </button>
            </form>
        </div>
    </div>

    <script src="contact-form-script.js"></script>
</body>
</html>
